<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modus Create - Prompt Library</title>
  <meta name="description" content="A curated, searchable library of battle-tested AI prompts for Developers, QA, Sales and Leadership — works with any AI assistant." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#grid">Skip to prompts</a>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </span>
        <div class="brand-text">
          <h1 id="lib-title">Modus Create Prompt Library</h1>
          <p id="lib-subtitle">Battle-tested prompts for the whole team.</p>
        </div>
      </div>

      <div class="header-actions">
        <span class="stat" id="stat-line" aria-live="polite"></span>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="search" type="search" placeholder="Search prompts, tags, roles…  (press / )" autocomplete="off" aria-label="Search prompts" />
        <kbd class="search-kbd">/</kbd>
      </div>
      <button id="copy-filtered" class="ghost-btn" type="button" title="Copy all visible prompts as Markdown">Export visible</button>
    </div>

    <nav id="chips" class="chips" aria-label="Filter by category"></nav>
  </header>

  <main>
    <section id="grid" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty" hidden>
      <p>No prompts match your search.</p>
      <button id="reset" class="ghost-btn" type="button">Clear filters</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>Made with ❤️ from Modus Create</p>
  </footer>

  <output id="toast" class="toast" aria-live="polite"></output>

  <script src="prompts.js"></script>
  <script src="app.js"></script>
</body>
</html>
